# channels.yaml — Session processing configuration
# Place this file in each session folder next to the exported CSV.
# The dump converter (and future pcap/packet reshaping tools) read this
# to know which CSV to load and how to interpret each channel.

csv: "Session 2.csv"       # pre-decoded Saleae Logic export — this is the input
RawCSV: "Session 2.raw.csv"  # optional — the raw Saleae export, for reference

channels:

  - name: "mainboardGrey"
    comment: "CN1grey wire - to mainboard - rxd pin"
    circuitBoard: "display"
    busType: "disp-mainboard_1"

  - name: "mainboardBlue"
    comment: "CN1 blue wire - to mainboard - txd pin"
    circuitBoard: "display"
    busType: "disp-mainboard_1"

  - name: "wifiBrown"
    comment: "CN3 brown wire — rx wifi module"
    circuitBoard: "display"
    busType: "uart"

  - name: "wifiOrange"
    comment: "orange wire — tx wifi module"
    circuitBoard: "display"
    busType: "uart"

  - name: "MideaIR"
    comment: "Raw IR signal from Midea remote control"
    circuitBoard: "display"
    busType: "ir_raw"
    file: "raw"
